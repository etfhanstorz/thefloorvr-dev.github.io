<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Floor VR</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }
    #players { margin-top: 10px; }
    .player-item { margin: 5px 0; }
    #ui input { padding: 5px; margin: 5px 0; }
    #ui button { padding: 8px 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    .hidden { display: none !important; }

    /* ---- login / sign-up screen ---- */
    #loginScreen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 30%, #1c1340 0%, #0a0614 70%);
      overflow: hidden;
    }
    #loginScreen::before { /* slow rotating glow behind the card */
      content: ''; position: absolute; width: 900px; height: 900px;
      background: conic-gradient(from 0deg, #ff2266, #ffb347, #33ccff, #ff33aa, #ff2266);
      filter: blur(120px); opacity: 0.22; border-radius: 50%;
      animation: spin 24s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card {
      position: relative; z-index: 1;
      width: 340px; padding: 36px 30px 28px;
      background: rgba(12, 8, 26, 0.82);
      border: 1px solid rgba(255, 210, 74, 0.35);
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,210,74,0.05);
      backdrop-filter: blur(6px);
      text-align: center; color: #fff;
    }
    .login-logo {
      font-size: 42px; font-weight: 800; letter-spacing: 3px; color: #ffd24a;
      text-shadow: 0 0 14px rgba(255,210,74,0.8), 0 0 30px rgba(255,160,40,0.4);
      animation: glow 2.6s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 12px rgba(255,210,74,0.6), 0 0 24px rgba(255,160,40,0.3); }
      to   { text-shadow: 0 0 20px rgba(255,210,74,1.0), 0 0 44px rgba(255,160,40,0.6); }
    }
    .login-sub { font-size: 13px; letter-spacing: 6px; color: #9fb4ff; margin: 4px 0 26px; }
    .login-card input {
      display: block; width: 100%; box-sizing: border-box;
      padding: 13px 14px; margin: 9px 0; font-size: 15px;
      background: rgba(255,255,255,0.06); color: #fff;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .login-card input::placeholder { color: rgba(255,255,255,0.4); }
    .login-card input:focus { border-color: #ffd24a; box-shadow: 0 0 0 3px rgba(255,210,74,0.18); }
    .btn-primary, .btn-secondary {
      width: 100%; padding: 13px; margin-top: 12px; font-size: 15px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer; transition: transform .08s, filter .2s;
    }
    .btn-primary { background: linear-gradient(135deg, #ffd24a, #ff9d2f); color: #1a1006; box-shadow: 0 6px 18px rgba(255,160,40,0.35); }
    .btn-secondary { background: transparent; color: #cdbff5; border: 1px solid rgba(157,180,255,0.4); }
    .btn-primary:hover, .btn-secondary:hover { filter: brightness(1.08); }
    .btn-primary:active, .btn-secondary:active { transform: translateY(1px); }
    .login-hint { margin-top: 18px; font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">THE FLOOR</div>
      <div class="login-sub">V R&nbsp;&nbsp;C A S I N O</div>
      <input type="text" id="username" placeholder="Username" autocomplete="off" />
      <input type="password" id="password" placeholder="Password" />
      <div id="loginError" style="display:none; color:#ff6b6b; font-size:13px; margin:4px 0 0;"></div>
      <button class="btn-primary" id="btnLogin" onclick="doLogin()">Enter the Floor</button>
      <button class="btn-secondary" id="btnRegister" onclick="doRegister()">Create Account</button>
      <div class="login-hint">FREE-PLAY CHIPS · NO REAL MONEY</div>
    </div>
  </div>

  <script>
    // Buttons delegate to the Supabase auth handler (supabase-client.js).
    // If that didn't load, fall back to a local-only entry.
    function localFallback() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if (!u || !p) { const e = document.getElementById('loginError'); if (e) { e.textContent = 'Enter a username and password.'; e.style.display = 'block'; } return; }
      window.currentUsername = u;
      window.currentPlayerId = 'local-' + u;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('ui').classList.remove('hidden');
      window.initializeGame && window.initializeGame();
      setTimeout(() => window.initGameScene && window.initGameScene(), 100);
    }
    function doLogin() { if (window.handleAuth) window.handleAuth('login'); else localFallback(); }
    function doRegister() { if (window.handleAuth) window.handleAuth('register'); else localFallback(); }
    // Enter key submits (login)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !document.getElementById('loginScreen').classList.contains('hidden')) doLogin();
    });
  </script>

  <div id="ui" class="hidden">
    <div>Connected: <span id="status">No</span></div>
    <div>Room: <span id="roomId">-</span></div>
    <div>Your ID: <span id="playerId">-</span></div>
    <div id="players">
      <strong>Players in room:</strong>
      <div id="playerList"></div>
    </div>
    <br />
    <button id="voiceBtn" onclick="toggleVoice()" style="background: #00aa00;">Enable Voice</button>
    <button id="muteBtn" onclick="toggleMute()" style="background: #666666; margin-left: 5px;">🔊</button>
    <button id="lbBtn" onclick="showLeaderboard()" style="background: #ffd24a; color:#1a1006; margin-left: 5px;">🏆</button>
    <button id="adminBtn" onclick="showAdminConsole()" style="background: #ff6b6b; margin-left: 5px; display:none;">🛡️ Admin</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- global (non-module) addons matching r128, for real VR controller models -->
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/webxr/XRControllerModelFactory.js"></script>
  <!-- clones rigged/skinned glTF models correctly (for character avatars) -->
  <script src="https://unpkg.com/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-latest.js"></script>

  <script src="src/model-loader.js?v=61"></script>
  <script src="src/audio.js?v=61"></script>
  <script src="src/player-data.js?v=61"></script>
  <script src="src/supabase-client.js?v=61"></script>
  <script src="src/player-avatar.js?v=61"></script>
  <script src="src/floor.js?v=61"></script>
  <script src="src/decor.js?v=61"></script>
  <script src="src/voice.js?v=61"></script>
  <script src="src/vr-hands.js?v=61"></script>
  <script src="src/vr-games.js?v=61"></script>
  <script src="src/peerjs-client.js?v=61"></script>
  <script src="src/mqtt-client.js?v=61"></script>
  <script src="src/remote-console.js?v=61"></script>
  <script src="src/socket-client.js?v=61"></script>
  <script src="src/games/poker.js?v=61"></script>
  <script src="src/poker-table.js?v=61"></script>
  <script src="src/games/blackjack.js?v=61"></script>

  <script src="src/games/wheel.js?v=61"></script>

  <script src="src/vr-ui.js?v=61"></script>
  <script src="src/models-scene.js?v=61"></script>
  <script src="src/main.js?v=61"></script>
</body>
</html>
